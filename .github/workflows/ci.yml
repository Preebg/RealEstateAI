name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    env:
      # engine._get_api_key() checks env before Streamlit secrets
      GEMINI_API_KEY: fake_key_for_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest mypy

      - name: Lint with Ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy quantum_portfolio.py engine.py --follow-imports=silent

      - name: Run tests
        run: pytest test_app.py -v
