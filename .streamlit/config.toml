[runner]
fastReruns = true

[server]
enableStaticServing = true

[theme]
base = "light"

[theme.light]
primaryColor = "#4f46e5"
backgroundColor = "#fafbfe"
secondaryBackgroundColor = "#f0f2f8"
textColor = "#1a1a2e"
linkColor = "#4f46e5"
borderColor = "#e0e4ef"

[theme.light.sidebar]
backgroundColor = "#f4f5fb"
secondaryBackgroundColor = "#ffffff"
textColor = "#1a1a2e"

[theme.dark]
primaryColor = "#818cf8"
backgroundColor = "#0b0f1a"
secondaryBackgroundColor = "#131927"
textColor = "#e8eaf0"
linkColor = "#818cf8"
borderColor = "#1e2640"

[theme.dark.sidebar]
backgroundColor = "#0e1320"
secondaryBackgroundColor = "#161d2e"
textColor = "#e8eaf0"
